<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FODMAP Ingredient Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f4f6f8;
            --card: #ffffff;
            --text: #333333;
            --primary: #0076ff;
            --danger: #ff3b30;
            --warning: #ff9500;
            --success: #34c759;
            --border: #e5e5ea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { font-size: 1.5rem; margin: 0; text-align: center; }
        .camera-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #camera-input { display: none; }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn-secondary {
            background-color: #5856d6;
        }
        /* Canvas box wrapper for selection */
        .canvas-container {
            width: 100%;
            position: relative;
            display: none;
            overflow: hidden;
            border-radius: 6px;
            background: #eee;
            touch-action: none; /* Prevents mobile scrolling while drawing a selection box */
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .status {
            font-style: italic;
            color: #666;
            text-align: center;
            min-height: 20px;
        }
        .result-box {
            padding: 15px;
            border-radius: 8px;
            background: #f9f9f9;
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        .score-display {
            font-size: 1.1rem;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .score-safe { background: #e8f5e9; color: var(--success); font-weight: bold; }
        .score-warn { background: #ffebee; color: var(--danger); font-weight: bold; }
        
        label { font-weight: bold; font-size: 0.9rem; color: #555; }
        .ocr-output-box {
            background: #fff;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            min-height: 20px;
            font-size: 0.95rem;
            color: #222;
        }
        textarea {
            width: 100%;
            height: 70px;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }
        details {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }
        summary { font-weight: bold; cursor: pointer; outline: none; }
        .help-list {
            margin-top: 10px;
            padding-left: 20px;
            font-size: 0.9rem;
            column-count: 2;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FODMAP Scanner</h1>
    
    <div class="camera-section">
        <label for="camera-input" class="btn">Snap Photo</label>
        <input type="file" id="camera-input" accept="image/*" capture="environment">
        
        <div id="canvas-wrapper" class="canvas-container">
            <canvas id="crop-canvas"></canvas>
        </div>
        
        <button id="scan-btn" class="btn btn-secondary" style="display: none;">Scan Selected Area</button>
    </div>

	
    <div id="status" class="status">Instructions: Snap a photo, then drag your finger over the text to select it.</div>

    <div id="results" class="result-box">
        <div id="score-zone" class="score-display"></div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <label>Detected via Scan:</label>
            <div id="ocr-keywords" class="ocr-output-box">None</div>
        </div>
    </div>

    <details>
        <summary>Raw Text (paste or edit text if necessary)</summary>
        <textarea id="ocr-text" placeholder="(raw text from scan)"></textarea>
    </details>
	
    <details>
        <summary>Supported Keywords Lookup</summary>
        <ul id="help-list" class="help-list"></ul>
    </details>
</div>

<script>
const HIGH_FODMAP_INGREDIENTS = [
	"agave", "apple", "apricot", "artichoke", "asparagus", "avocado", "banana", 
	"barley", "blackberries", "blackberry", "boysenberries", "boysenberry", "cashew", 
	"cauliflower", "cherries", "cherry", "chicory", "cream", "date", "fig", 
	"fructose", "garlic", "grapefruit", "honey", "ice cream", "inulin", "isomalt", 
	"kidney bean", "lactose", "leek", "lentil", "lima bean", "maltitol", "mango", 
	"mannitol", "milk", "mushroom", "nectarine", "onion", "peaches", "pear", "peas", 
	"pistachio	", "plums", "prune", "raisin", "rye", "shallot", "shallots", 
	"sorbitol", "soybeans", "watermelon", "wheat", "xylitol", "yogurt"
];

let detectedOcrKeywords = [];
let originalImage = new Image();

// Canvas coordination state
const canvas = document.getElementById('crop-canvas');
const ctx = canvas.getContext('2d');
const canvasWrapper = document.getElementById('canvas-wrapper');
const scanBtn = document.getElementById('scan-btn');
const cameraInput = document.getElementById('camera-input');
const statusDiv = document.getElementById('status');
const resultsDiv = document.getElementById('results');
const ocrKeywordsDiv = document.getElementById('ocr-keywords');
const scoreZone = document.getElementById('score-zone');
const ocrText = document.getElementById('ocr-text');

let isDrawing = false;
let startX, startY, currentX, currentY;

// Populate help area
const helpList = document.getElementById('help-list');
HIGH_FODMAP_INGREDIENTS.forEach(item => {
    const li = document.createElement('li');
    li.textContent = item;
    helpList.appendChild(li);
});

// Capture photo and draw it to canvas
cameraInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    resultsDiv.style.display = 'none';
    statusDiv.textContent = "Loading image... Drag a box over ingredients.";
    
    originalImage.src = URL.createObjectURL(file);
    originalImage.onload = function() {
        // Size canvas to native size of target image
        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        
        // Reset selection coordinate memory
        startX = startY = currentX = currentY = 0;
        
        drawCanvas();
        canvasWrapper.style.display = 'block';
        scanBtn.style.display = 'block';
    };
});

function drawCanvas() {
    // 1. Draw base photo
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(originalImage, 0, 0);

    // 2. Draw selection overlay bounding rectangle if one exists
    if (startX !== currentX || startY !== currentY) {
        ctx.strokeStyle = '#0076ff';
        ctx.lineWidth = Math.max(canvas.width / 200, 4); // Scale line thickness dynamically with high-res photos
        ctx.fillStyle = 'rgba(0, 118, 255, 0.15)';
        
        const w = currentX - startX;
        const h = currentY - startY;
        
        ctx.fillRect(startX, startY, w, h);
        ctx.strokeRect(startX, startY, w, h);
    }
}

// Convert screen touch space coordinates to internal native canvas pixel map coordinates
function getCanvasCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // Scale tracking matrix to match visual element display constraints
    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

function startSelection(e) {
    isDrawing = true;
    const coords = getCanvasCoordinates(e);
    startX = coords.x;
    startY = coords.y;
    currentX = coords.x;
    currentY = coords.y;
}

function moveSelection(e) {
    if (!isDrawing) return;
    const coords = getCanvasCoordinates(e);
    currentX = coords.x;
    currentY = coords.y;
    drawCanvas();
}

function endSelection() {
    isDrawing = false;
}

// Mouse event monitors
canvas.addEventListener('mousedown', startSelection);
canvas.addEventListener('mousemove', moveSelection);
window.addEventListener('mouseup', endSelection);

// Touch event monitors for mobile
canvas.addEventListener('touchstart', startSelection);
canvas.addEventListener('touchmove', moveSelection);
window.addEventListener('touchend', endSelection);

// Crop the active selection area out and pass it to Tesseract
scanBtn.addEventListener('click', async function() {
    // Default back to entire image bounds if user didn't draw a customized crop zone box
    let x = Math.min(startX, currentX);
    let y = Math.min(startY, currentY);
    let w = Math.abs(currentX - startX);
    let h = Math.abs(currentY - startY);

    if (w < 10 || h < 10) {
        x = 0; y = 0; w = canvas.width; h = canvas.height;
    }

    // Create a temporary staging canvas to extract the crop bounding context
    const cropCanvas = document.createElement('canvas');
    cropCanvas.width = w;
    cropCanvas.height = h;
    const cropCtx = cropCanvas.getContext('2d');
    
    cropCtx.drawImage(canvas, x, y, w, h, 0, 0, w, h);
    const croppedDataUrl = cropCanvas.toDataURL();

    statusDiv.textContent = "Initializing OCR engine...";
    scanBtn.disabled = true;

    try {
        const worker = await Tesseract.createWorker('eng');
        statusDiv.textContent = "Analyzing selected text block...";
        const ret = await worker.recognize(croppedDataUrl);
        const text = ret.data.text;
        await worker.terminate();
        
        statusDiv.textContent = "Done. Adjust selection or view rules down below.";
        scanBtn.disabled = false;
		ocrText.value=text;		
        analyzeText(text);
    } catch (error) {
        console.error(error);
        statusDiv.textContent = "OCR processing failed. Try adjusting crop box bounds.";
        scanBtn.disabled = false;
    }
});

function recalc()
{
	analyzeText(ocrText.value);
}

function analyzeText(rawText) {
    const normalizedText = rawText.toLowerCase();
    let matchesWithIndex = [];

    HIGH_FODMAP_INGREDIENTS.forEach(ingredient => {
        let index = normalizedText.indexOf(ingredient);
        while (index !== -1) {
            matchesWithIndex.push({ name: ingredient, index: index });
            index = normalizedText.indexOf(ingredient, index + 1);
        }
    });

    matchesWithIndex.sort((a, b) => a.index - b.index);
    detectedOcrKeywords = [...new Set(matchesWithIndex.map(item => item.name))];

    if (detectedOcrKeywords.length > 0) {
        ocrKeywordsDiv.textContent = detectedOcrKeywords.join(", ");
    } else {
        ocrKeywordsDiv.textContent = "None";
    }
    
    calculateScore();
    resultsDiv.style.display = 'flex';
}

function calculateScore() {
    const scoredSet = new Set([...detectedOcrKeywords);
    const totalCount = scoredSet.size;

    if (totalCount === 0) {
        scoreZone.className = "score-display score-safe";
        scoreZone.textContent = "Likely Low FODMAP";
    } else {
        scoreZone.className = "score-display score-warn";
        scoreZone.textContent = `High FODMAP Triggers Found (${totalCount})`;
    }
}

userInput.addEventListener('input', calculateCombinedScore);
ocrText.addEventListener('input', recalc);
</script>

</body>
</html>
