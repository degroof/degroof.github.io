<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FODMAP Ingredient Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #f4f6f8;
            --card: #ffffff;
            --text: #333333;
            --primary: #0076ff;
            --danger: #ff3b30;
            --warning: #ff9500;
            --success: #34c759;
            --border: #e5e5ea;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h1 { font-size: 1.5rem; margin: 0; text-align: center; }
        .camera-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #camera-input { display: none; }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        #preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 6px;
            display: none;
            background: #eee;
        }
        .status {
            font-style: italic;
            color: #666;
            text-align: center;
            min-height: 20px;
        }
        .result-box {
            padding: 15px;
            border-radius: 8px;
            background: #f9f9f9;
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .score-display {
            font-size: 1.1rem;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .score-safe { background: #e8f5e9; color: var(--success); font-weight: bold; }
        .score-warn { background: #ffebee; color: var(--danger); font-weight: bold; }
        
        label { font-weight: bold; font-size: 0.9rem; color: #555; }
        textarea {
            width: 100%;
            height: 80px;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }
        .note { font-size: 0.8rem; color: #666; margin-top: -5px; }

        /* Help Section styling using native details/summary */
        details {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }
        summary {
            font-weight: bold;
            cursor: pointer;
            outline: none;
            user-select: none;
        }
        .help-list {
            margin-top: 10px;
            padding-left: 20px;
            font-size: 0.9rem;
            column-count: 2; /* Splits the keywords into two neat columns on mobile */
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FODMAP Scanner</h1>
    
    <div class="camera-section">
        <label for="camera-input" class="btn">Snap Ingredients List</label>
        <input type="file" id="camera-input" accept="image/*" capture="environment">
        <img id="preview" alt="Image preview">
    </div>

    <div id="status" class="status"></div>

    <div id="results" class="result-box">
        <div id="score-zone" class="score-display"></div>
        
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <label for="keyword-input">Detected High-FODMAP Ingredients:</label>
            <textarea id="keyword-input" placeholder="No triggers found. Type here to manually add some..."></textarea>
            <span class="note">💡 Something missing or wrong? Edit the list above (separated by commas) to recalculate.</span>
        </div>
    </div>

    <details>
        <summary>Supported Keywords Lookup</summary>
        <ul id="help-list" class="help-list"></ul>
    </details>
</div>

<script>
// Master dictionary of high-FODMAP items
const HIGH_FODMAP_INGREDIENTS = [
    "agave", "barley", "chicory root", "cream", "fructose", 
    "garlic", "high fructose corn syrup", "honey", "ice cream", 
    "inulin", "isomalt", "lactose", "leek", "maltitol", 
    "mannitol", "milk", "onion", "rye", "shallot", 
    "sorbitol", "wheat", "xylitol", "yogurt"
];

// Populate the help area automatically on load
const helpList = document.getElementById('help-list');
HIGH_FODMAP_INGREDIENTS.forEach(item => {
    const li = document.createElement('li');
    li.textContent = item;
    helpList.appendChild(li);
});

const cameraInput = document.getElementById('camera-input');
const preview = document.getElementById('preview');
const statusDiv = document.getElementById('status');
const resultsDiv = document.getElementById('results');
const keywordInput = document.getElementById('keyword-input');
const scoreZone = document.getElementById('score-zone');

cameraInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    resultsDiv.style.display = 'none';
    
    processImage(file);
});

async function processImage(file) {
    statusDiv.textContent = "Initializing OCR engine...";
    try {
        const worker = await Tesseract.createWorker('eng');
        statusDiv.textContent = "Analyzing package text...";
        const ret = await worker.recognize(file);
        const text = ret.data.text;
        await worker.terminate();
        
        statusDiv.textContent = "";
        analyzeText(text);
    } catch (error) {
        console.error(error);
        statusDiv.textContent = "Error scanning image. Try again.";
    }
}

function analyzeText(rawText) {
    const normalizedText = rawText.toLowerCase();
    let matchesWithIndex = [];

    // Find ingredients and log their starting positions in the text
    HIGH_FODMAP_INGREDIENTS.forEach(ingredient => {
        let index = normalizedText.indexOf(ingredient);
        // Loop to find all instances if an ingredient appears multiple times
        while (index !== -1) {
            matchesWithIndex.push({ name: ingredient, index: index });
            index = normalizedText.indexOf(ingredient, index + 1);
        }
    });

    // Sort matches by the order they physically appeared in the ingredients list
    matchesWithIndex.sort((a, b) => a.index - b.index);

    // Extract just the unique names in order
    const orderedMatches = [...new Set(matchesWithIndex.map(item => item.name))];

    // Populate the text area
    keywordInput.value = orderedMatches.join(", ");
    
    // Trigger the initial scoring
    calculateScore();
    resultsDiv.style.display = 'flex';
}

function calculateScore() {
    // Parse the textarea, splitting by commas, discarding empty spaces
    const currentKeywords = keywordInput.value
        .split(",")
        .map(item => item.trim().toLowerCase())
        .filter(item => item.length > 0);

    if (currentKeywords.length === 0) {
        scoreZone.className = "score-display score-safe";
        scoreZone.textContent = "Likely Low FODMAP";
    } else {
        scoreZone.className = "score-display score-warn";
        scoreZone.textContent = `High FODMAP Triggers Found (${currentKeywords.length})`;
    }
}

// Live listener: Calculate scoring on keyup or paste inside the textarea
keywordInput.addEventListener('input', calculateScore);
</script>

</body>
</html>
