<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveByFive</title>
    <link rel="stylesheet" href="fivebyfive-styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 id="gameName">FiveByFive</h1>
                <div class="game-info">
                    <span id="gameNumber">Game #1</span>
                </div>
            </div>
            <!-- Instructions (Collapsible) -->
            <div class="instructions-section">
                <button class="instructions-toggle" id="instructionsToggle">📖 Instructions</button>
                <div class="instructions-content" id="instructionsContent" style="display: none;">
                    <p>Form six 5-letter words using the tiles below:</p>
                    <p>Drag and drop tiles onto the white squares of the grid.</p>
                    <p>You can get up to three hints, but it will remove any tiles you've already placed.</p>
                </div>
            </div>
        </header>

        <!-- Game Board -->
        <main class="game-board-container">
            <!-- 5x5 Grid -->
            <div class="grid" id="gameGrid">
                <!-- generated in js -->
            </div>

            <!-- Tile Rack -->
            <div class="tile-rack" id="tileRack">
                <!-- Tiles will be generated by JavaScript -->
            </div>
        </main>

        <!-- Button Bar -->
        <div class="button-bar" id="buttonBar">
            <button class="game-button" id="giveUpBtn" style="display: none;">GIVE UP</button>
            <button class="game-button" id="hintBtn" style="display: none;">HINT</button>
            <button class="game-button" id="checkBtn" style="display: none;">CHECK</button>
            <button class="game-button" id="shareBtn" style="display: none;">SHARE</button>
        </div>
    </div>


    <div id="toast">Results copied to clipboard.</div>
    <script src="fivebyfive-words.js"></script>
    <script src="fivebyfive-grids.js"></script>
    <script src="fivebyfive.js"></script>
</body>
</html>
